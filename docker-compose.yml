  #   ports:
  #     - "6274:6274"
  #     - "6277:6277"
  #   environment:
  #     - MCP_TRANSPORT=stdio
  #     - HOST=${MCP_HOST:-0.0.0.0}
  #     - DOKUWIKI_URL=${DOKUWIKI_URL:-http://dokuwiki}
