services:
  # 1. Das Test-DokuWiki
  # access api via: http://localhost:8080/lib/exe/openapi.php#?route=overview
  dokuwiki:
    image: lscr.io/linuxserver/dokuwiki:latest
    container_name: dokuwiki
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
    volumes:
      - dokuwiki-data:/config
      - ./docker/dokuwiki-config:/config/dokuwiki/conf
    ports:
      - "8080:80"
    restart: unless-stopped

  # 2. Unser Produktionsnaher MCP Server (API)
  # Dieser läuft auf Port 8000 für dein späteres Cloud-Deployment!
  dokuwiki-mcp:
    build:
      context: .                
      dockerfile: docker/Dockerfile
    container_name: dokuwiki_mcp
    ports:
      - "8000:8000"
    environment:
      - MCP_TRANSPORT=sse
      - HOST=0.0.0.0
      - DOKUWIKI_URL=http://dokuwiki
      - DOKUWIKI_TOKEN=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJkb2t1d2lraSIsInN1YiI6Im1jcC1yZWFkIiwiaWF0IjoxNzc1OTQzMTk5fQ==.rBdJZeCuNIUQrVjHv7p14aogj0aSWDwWjftweYIiRZY=   #read
      #- DOKUWIKI_TOKEN=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJkb2t1d2lraSIsInN1YiI6Im1jcC13cml0ZSIsImlhdCI6MTc3NTk0MzU1NH0=.hhQNhX96m2ZTEAg31mMZYNmiv/UDUQEva1WpE1puZbw=   #write
    depends_on:
      - dokuwiki
    restart: unless-stopped

  # 3. Der Web Inspector (UI zum Debuggen)
  # Nutzt die absolut krisensichere STDIO-Methode.
